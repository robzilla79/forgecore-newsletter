name: Rebuild & Deploy Site

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you rebuilding? (optional, for the log)'
        required: false
        default: 'manual rebuild'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI
      NEWSLETTER_TAGLINE: "AI seen clearly. Written by Em."
      SPONSOR_EMAIL: sponsors@forgecore.co
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      ENABLE_CLOUDFLARE_DEPLOY: '1'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild site
        run: |
          echo "Reason: ${{ github.event.inputs.reason }}"
          python publish_site.py

      - name: Commit rebuilt site
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add site/dist/
          if git diff --staged --quiet; then
            echo "Nothing changed in site/dist — already up to date"
          else
            git pull --rebase origin main
            git add site/dist/
            git commit -m "em: site rebuild (${{ github.event.inputs.reason }})"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main
