name: Em Sends the AM Issue

on:
  schedule:
    # Send window: 10:07 AM Central during daylight time, 9:07 AM Central during standard time.
    - cron: '7 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  send-am:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: am
