name: Em Generates the AM Issue

# AM schedule removed. Generate is now handled by generate-daily.yml.
# This wrapper is kept for manual legacy slot use only.
on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read

jobs:
  prepare-am:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am
