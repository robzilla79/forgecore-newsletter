name: Generate AM Newsletter Issue

on:
  schedule:
    # Target send window: 10:07 AM Central during daylight time, 9:07 AM Central during standard time.
    # GitHub cron runs in UTC; the odd minute avoids top-of-hour queue congestion.
    - cron: '7 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  generate-am:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am
