name: Prepare AM Newsletter Issue

on:
  schedule:
    # Prepare window: 7:30 AM Central during daylight time, 6:30 AM Central during standard time.
    # Email delivery happens later in send-am.yml.
    - cron: '30 12 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'state/manual-am-run.txt'
      - '.github/workflows/generate-am.yml'

permissions:
  contents: write
  actions: read

jobs:
  prepare-am:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am
