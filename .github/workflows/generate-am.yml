name: Em Generates the AM Issue

on:
  schedule:
    # 6:00 AM Central (CDT = UTC-5, so 11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  prepare-am:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am
