name: Em Recovery — Autonomous Issue Guard

on:
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Slot to check and recover'
        required: true
        type: choice
        options:
          - all
          - am
          - pm
        default: all
      allow_send:
        description: 'Allow safe send recovery through the existing idempotent Kit send workflow'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # 11:05 AM CDT (16:05 UTC) daily — after both send windows
    - cron: '5 16 * * *'

concurrency:
  group: forgecore-recovery
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  detect:
    name: Detect safe recovery actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      am_prepare_needed: ${{ steps.detect.outputs.am_prepare_needed }}
      am_send_needed: ${{ steps.detect.outputs.am_send_needed }}
      am_prepare_then_send: ${{ steps.detect.outputs.am_prepare_then_send }}
      pm_prepare_needed: ${{ steps.detect.outputs.pm_prepare_needed }}
      pm_send_needed: ${{ steps.detect.outputs.pm_send_needed }}
      pm_prepare_then_send: ${{ steps.detect.outputs.pm_prepare_then_send }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Detect missing slots
        id: detect
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          LOCAL_TZ_OFFSET = -5  # CDT
          now_utc = datetime.now(timezone.utc)
          now_local = now_utc + timedelta(hours=LOCAL_TZ_OFFSET)
          today = now_local.strftime('%Y-%m-%d')
          allow_send = os.environ.get('ALLOW_SEND', 'false').lower() == 'true'

          input_slot = os.environ.get('INPUT_SLOT', 'all')
          print(f'Local date: {today}')
          print(f'Allow send recovery: {allow_send}')
          print(f'Slot filter: {input_slot}')

          sent_log_path = Path('state/kit_sent.json')
          sent_log = {}
          if sent_log_path.exists():
              try:
                  sent_log = json.loads(sent_log_path.read_text())
              except Exception:
                  pass

          def blocks_email(record):
              return isinstance(record, dict) and (
                  record.get('email_delivery') == 'scheduled_or_sent' or record.get('mode') == 'public'
              )

          results = {}
          for slot in ('am', 'pm'):
              if input_slot != 'all' and input_slot != slot:
                  results[f'{slot}_prepare_needed'] = 'false'
                  results[f'{slot}_send_needed'] = 'false'
                  results[f'{slot}_prepare_then_send'] = 'false'
                  continue

              slug = f'{today}-{slot}'
              issue = Path('content/issues') / f'{slug}.md'
              email = Path('content/email') / f'{slug}.md'
              sent = blocks_email(sent_log.get(issue.stem))

              if issue.exists() and email.exists() and sent:
                  action = 'no_action'
                  reason = f'{slug} issue, email snapshot, and Kit send record already exist.'
              elif now_local.hour < (10 if slot == 'am' else 13):
                  action = 'no_action'
                  reason = f'Too early for {slug} recovery. Skipping.'
              elif not issue.exists():
                  if now_local.hour >= (11 if slot == 'am' else 14):
                      action = 'prepare_only'
                      reason = f'{slug} issue is missing after prepare window; prepare without email send.'
                  else:
                      action = 'no_action'
                      reason = f'{slug} issue is missing but still within prepare window.'
              elif issue.exists() and not email.exists():
                  action = 'prepare_only'
                  reason = f'{slug} locked email snapshot is missing; rerun prepare flow.'
              elif issue.exists() and email.exists() and not sent:
                  if allow_send:
                      action = 'send_only'
                      reason = f'{slug} issue and email snapshot exist, but Kit sent record is missing after send window.'
                  else:
                      action = 'no_action'
                      reason = f'{slug} issue and email snapshot exist, but send recovery is not allowed or send window has not passed.'
              else:
                  action = 'no_action'
                  reason = f'{slug} state unclear; defaulting to no action.'

              print(f'{slug}: {action} — {reason}')
              results[f'{slot}_prepare_needed'] = 'true' if action == 'prepare_only' else 'false'
              results[f'{slot}_send_needed'] = 'true' if action == 'send_only' else 'false'
              results[f'{slot}_prepare_then_send'] = 'false'

          for key, value in results.items():
              print(f'{key}={value}', flush=True)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  fh.write(f'{key}={value}\n')
          PYEOF
        env:
          INPUT_SLOT: ${{ github.event.inputs.issue_slot || 'all' }}
          ALLOW_SEND: ${{ github.event.inputs.allow_send || 'false' }}

  repair-am-prepare:
    name: Repair AM prepare
    needs: detect
    if: needs.detect.outputs.am_prepare_needed == 'true'
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-am-send:
    name: Repair AM send only
    needs: detect
    if: needs.detect.outputs.am_send_needed == 'true'
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-am-prepare-then-send:
    name: Repair AM send after prepare
    needs: repair-am-prepare
    if: needs.detect.outputs.am_prepare_then_send == 'true'
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-pm-prepare:
    name: Repair PM prepare
    needs: detect
    if: needs.detect.outputs.pm_prepare_needed == 'true'
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm

  repair-pm-send:
    name: Repair PM send only
    needs: detect
    if: needs.detect.outputs.pm_send_needed == 'true'
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm

  repair-pm-prepare-then-send:
    name: Repair PM send after prepare
    needs: repair-pm-prepare
    if: needs.detect.outputs.pm_prepare_then_send == 'true'
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm

  summary:
    name: Recovery decision summary
    needs:
      - detect
      - repair-am-prepare
      - repair-am-send
      - repair-am-prepare-then-send
      - repair-pm-prepare
      - repair-pm-send
      - repair-pm-prepare-then-send
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize autonomous recovery
        run: |
          {
            echo "## Em autonomous issue recovery — here is what I found"
            echo ""
            echo "AM prepare needed: ${{ needs.detect.outputs.am_prepare_needed }}"
            echo "AM send needed:    ${{ needs.detect.outputs.am_send_needed }}"
            echo "AM prepare→send:   ${{ needs.detect.outputs.am_prepare_then_send }}"
            echo "PM prepare needed: ${{ needs.detect.outputs.pm_prepare_needed }}"
            echo "PM send needed:    ${{ needs.detect.outputs.pm_send_needed }}"
            echo "PM prepare→send:   ${{ needs.detect.outputs.pm_prepare_then_send }}"
            echo ""
            echo "Repair jobs delegated to generate.yml and send.yml — Em handled the routing."
            echo "Duplicate-send guard is still in place via kit_publish.py and state/kit_sent.json."
          } >> "$GITHUB_STEP_SUMMARY"
