name: Autonomous Newsletter Recovery

on:
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Slot to check and recover'
        required: true
        type: choice
        options:
          - all
          - am
          - pm
        default: all
      allow_send:
        description: 'Allow safe send recovery through the existing idempotent Kit send workflow'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      reason:
        description: 'Audit reason for manual autonomous recovery run'
        required: false
        default: 'Manual autonomous recovery check'
  schedule:
    # Post-AM window, post-PM window, and evening final safety net.
    # UTC schedules intentionally follow the existing repo pattern; the detector uses America/Chicago gates.
    - cron: '45 15 * * *'
    - cron: '0 22 * * *'
    - cron: '20 0 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-autonomous-newsletter-recovery
  cancel-in-progress: false

jobs:
  detect:
    name: Detect safe recovery actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      am_action: ${{ steps.detect.outputs.am_action }}
      am_reason: ${{ steps.detect.outputs.am_reason }}
      pm_action: ${{ steps.detect.outputs.pm_action }}
      pm_reason: ${{ steps.detect.outputs.pm_reason }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Detect missing slots
        id: detect
        env:
          INPUT_SLOT: ${{ github.event.inputs.issue_slot || 'all' }}
          ALLOW_SEND: ${{ github.event.inputs.allow_send || 'true' }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          central = ZoneInfo('America/Chicago')
          now = datetime.now(central)
          today = now.date().isoformat()
          mode = (os.environ.get('INPUT_SLOT') or 'all').strip().lower()
          allow_send = (os.environ.get('ALLOW_SEND') or 'true').strip().lower() == 'true'

          sent_log_path = Path('state/kit_sent.json')
          try:
              sent_log = json.loads(sent_log_path.read_text(encoding='utf-8')) if sent_log_path.exists() else {}
              if not isinstance(sent_log, dict):
                  sent_log = {}
          except Exception:
              sent_log = {}

          # Gate recovery so PM is not auto-flagged during the morning.
          windows = {
              'am': {'prepare_after': (7, 45), 'send_after': (10, 35)},
              'pm': {'prepare_after': (13, 45), 'send_after': (16, 50)},
          }

          def minutes(pair):
              return pair[0] * 60 + pair[1]

          def blocks_email(record):
              return isinstance(record, dict) and (
                  record.get('email_delivery') == 'scheduled_or_sent' or record.get('mode') == 'public'
              )

          def decide(slot):
              if mode not in {'all', slot}:
                  return 'no_action', f'{slot.upper()} not selected for this run.'
              slug = f'{today}-{slot}'
              issue = Path('content/issues') / f'{slug}.md'
              email = Path('content/email') / f'{slug}.md'
              record = sent_log.get(slug)
              sent = blocks_email(record)
              current_minutes = now.hour * 60 + now.minute
              prepare_due = current_minutes >= minutes(windows[slot]['prepare_after'])
              send_due = current_minutes >= minutes(windows[slot]['send_after'])

              if issue.exists() and email.exists() and sent:
                  return 'no_action', f'{slug} issue, email snapshot, and Kit send record already exist.'
              if not prepare_due:
                  return 'no_action', f'{slug} prepare window has not passed yet.'
              if not issue.exists():
                  if allow_send and send_due:
                      return 'prepare_and_send', f'{slug} issue is missing after send window; auto-recover by preparing and sending through guarded workflow.'
                  return 'prepare_only', f'{slug} issue is missing after prepare window; prepare without email send.'
              if issue.exists() and not email.exists():
                  return 'prepare_only', f'{slug} locked email snapshot is missing; rerun prepare flow.'
              if issue.exists() and email.exists() and not sent:
                  if allow_send and send_due:
                      return 'send_only', f'{slug} issue and email snapshot exist, but Kit sent record is missing after send window.'
                  return 'no_action', f'{slug} issue and email snapshot exist, but send recovery is not allowed or send window has not passed.'
              return 'investigate', f'{slug} is in an unexpected state. Human review required.'

          results = {}
          for slot in ('am', 'pm'):
              action, reason = decide(slot)
              results[f'{slot}_action'] = action
              results[f'{slot}_reason'] = reason

          print(f'Local time: {now.isoformat()}')
          print(json.dumps(results, indent=2))

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              for key, value in results.items():
                  safe = str(value).replace('\n', ' ')
                  out.write(f'{key}={safe}\n')
          PY

  repair-am-prepare:
    name: Repair AM prepare
    if: ${{ needs.detect.outputs.am_action == 'prepare_only' || needs.detect.outputs.am_action == 'prepare_and_send' }}
    needs: detect
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-am-send-only:
    name: Repair AM send only
    if: ${{ needs.detect.outputs.am_action == 'send_only' }}
    needs: detect
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-am-send-after-prepare:
    name: Repair AM send after prepare
    if: ${{ needs.detect.outputs.am_action == 'prepare_and_send' }}
    needs:
      - detect
      - repair-am-prepare
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: am

  repair-pm-prepare:
    name: Repair PM prepare
    if: ${{ needs.detect.outputs.pm_action == 'prepare_only' || needs.detect.outputs.pm_action == 'prepare_and_send' }}
    needs: detect
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm

  repair-pm-send-only:
    name: Repair PM send only
    if: ${{ needs.detect.outputs.pm_action == 'send_only' }}
    needs: detect
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm

  repair-pm-send-after-prepare:
    name: Repair PM send after prepare
    if: ${{ needs.detect.outputs.pm_action == 'prepare_and_send' }}
    needs:
      - detect
      - repair-pm-prepare
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm

  summary:
    name: Recovery decision summary
    runs-on: ubuntu-latest
    needs:
      - detect
      - repair-am-prepare
      - repair-am-send-only
      - repair-am-send-after-prepare
      - repair-pm-prepare
      - repair-pm-send-only
      - repair-pm-send-after-prepare
    if: always()
    steps:
      - name: Summarize autonomous recovery
        run: |
          {
            echo "## ForgeCore autonomous newsletter recovery"
            echo ""
            echo "AM action: ${{ needs.detect.outputs.am_action }}"
            echo "AM reason: ${{ needs.detect.outputs.am_reason }}"
            echo ""
            echo "PM action: ${{ needs.detect.outputs.pm_action }}"
            echo "PM reason: ${{ needs.detect.outputs.pm_reason }}"
            echo ""
            echo "Repair prepare/send jobs use the existing generate.yml and send.yml workflows."
            echo "Kit duplicate-send protection remains enforced by kit_publish.py and state/kit_sent.json."
          } >> "$GITHUB_STEP_SUMMARY"
