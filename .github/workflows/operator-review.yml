name: Em Operator Review

on:
  schedule:
    # Daily at 7 PM CDT / midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-operator-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily operator review
        run: python operator_review.py

      - name: Commit review output
        if: success()
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add state/ || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-operator-review
            git pull --rebase origin main
            git stash pop
            git add state/ || true
            git commit -m "ops: daily operator review $(date -u '+%Y-%m-%d') [bot]"
            git push
          fi
