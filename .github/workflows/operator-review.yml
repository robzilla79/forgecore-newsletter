name: Daily Operator Review

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-operator-review
  cancel-in-progress: true

jobs:
  operator-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate operator review
        run: python operator_review.py

      - name: Upload operator review artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgecore-operator-review-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            state/operator-review-latest.md
            state/operator-reviews/*.md

      - name: Commit operator review
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add state/operator-review-latest.md state/operator-reviews/
          if git diff --staged --quiet; then
            echo "No operator review changes to commit"
          else
            git pull --rebase origin main
            git add state/operator-review-latest.md state/operator-reviews/
            git commit -m "ops: daily operator review $(date -u '+%Y-%m-%d') [bot]"
            git push
          fi
