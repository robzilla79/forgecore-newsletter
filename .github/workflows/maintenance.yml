name: Site Maintenance - SEO & Publish Audit

on:
  schedule:
    # Every Sunday at 6 AM CDT / 11:00 UTC
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - publish_verify
          - seo_audit
          - broken_links

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-maintenance
  cancel-in-progress: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE_BASE_URL: https://news.forgecore.co
      SITE_DOMAIN: news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      SPONSOR_EMAIL: sponsors@forgecore.co

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render canonical site
        if: ${{ github.event.inputs.task == 'all' || github.event.inputs.task == 'publish_verify' || github.event.inputs.task == '' }}
        run: python publish_site.py

      - name: Verify canonical publish outputs
        if: ${{ github.event.inputs.task == 'all' || github.event.inputs.task == 'publish_verify' || github.event.inputs.task == '' }}
        run: python verify_publish.py

      - name: SEO audit
        if: ${{ github.event.inputs.task == 'all' || github.event.inputs.task == 'seo_audit' || github.event.inputs.task == '' }}
        run: |
          python - << 'PYEOF'
          import json
          import re
          from pathlib import Path

          dist = Path('site/dist')
          issues = []
          html_files = sorted(dist.glob('**/*.html'))
          print(f'[seo] Auditing {len(html_files)} HTML files...')

          def tag(pattern, text):
              return re.search(pattern, text, flags=re.IGNORECASE | re.DOTALL)

          for path in html_files:
              html = path.read_text(encoding='utf-8')
              rel = path.relative_to(dist).as_posix()
              page_issues = []

              title = tag(r'<title>(.*?)</title>', html)
              if not title or not title.group(1).strip():
                  page_issues.append('MISSING title tag')
              elif len(title.group(1).strip()) > 75:
                  page_issues.append(f'title too long ({len(title.group(1).strip())} chars, max 75)')

              desc = tag(r'<meta\s+name=["\']description["\']\s+content=["\']([^"\']*)["\']', html)
              if not desc or not desc.group(1).strip():
                  page_issues.append('MISSING meta description')
              elif len(desc.group(1).strip()) > 160:
                  page_issues.append(f'meta description too long ({len(desc.group(1).strip())} chars, max 160)')

              for label, pattern in {
                  'canonical link': r'<link\s+rel=["\']canonical["\']\s+href=["\'][^"\']+["\']',
                  'og:title': r'<meta\s+property=["\']og:title["\']\s+content=["\'][^"\']+["\']',
                  'og:description': r'<meta\s+property=["\']og:description["\']\s+content=["\'][^"\']+["\']',
                  'og:url': r'<meta\s+property=["\']og:url["\']\s+content=["\'][^"\']+["\']',
                  'twitter card': r'<meta\s+name=["\']twitter:card["\']\s+content=["\'][^"\']+["\']',
              }.items():
                  if not tag(pattern, html):
                      page_issues.append(f'MISSING {label}')

              h1_count = len(re.findall(r'<h1\b', html, flags=re.IGNORECASE))
              if h1_count == 0:
                  page_issues.append('MISSING h1 tag')
              elif h1_count > 1:
                  page_issues.append(f'Multiple h1 tags ({h1_count})')

              if page_issues:
                  issues.append({'file': rel, 'issues': page_issues})

          Path('state').mkdir(exist_ok=True)
          Path('state/seo-audit.json').write_text(json.dumps(issues, indent=2) + '\n', encoding='utf-8')
          if issues:
              print(f'[seo] Found issues in {len(issues)} page(s)')
              for item in issues[:20]:
                  print(f"  {item['file']}: " + '; '.join(item['issues']))
              raise SystemExit(1)
          print('[seo] All pages pass SEO audit')
          PYEOF

      - name: Broken internal link check
        if: ${{ github.event.inputs.task == 'all' || github.event.inputs.task == 'broken_links' || github.event.inputs.task == '' }}
        run: |
          python - << 'PYEOF'
          import json
          import re
          from pathlib import Path

          dist = Path('site/dist')
          broken = []
          for path in sorted(dist.glob('**/*.html')):
              html = path.read_text(encoding='utf-8')
              rel = path.relative_to(dist).as_posix()
              for href in re.findall(r'<a\b[^>]*\shref=["\']([^"\']+)["\']', html, flags=re.IGNORECASE):
                  if href.startswith(('#', 'http://', 'https://', 'mailto:')):
                      continue
                  clean = href.split('#', 1)[0].split('?', 1)[0]
                  target = dist / clean.lstrip('/')
                  if not target.exists() and not (target / 'index.html').exists():
                      broken.append({'page': rel, 'href': href})

          Path('state').mkdir(exist_ok=True)
          Path('state/broken-links.json').write_text(json.dumps(broken, indent=2) + '\n', encoding='utf-8')
          if broken:
              print(f'[links] Found {len(broken)} broken internal links')
              for item in broken[:20]:
                  print(f"  {item['page']} -> {item['href']}")
              raise SystemExit(1)
          print('[links] No broken internal links found')
          PYEOF

      - name: Commit maintenance artifacts
        if: success()
        run: |
          git config user.name "ForgeCore Maintenance Bot"
          git config user.email "bot@forgecore.co"
          git add site/dist state/seo-audit.json state/broken-links.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "[commit] Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-maintenance
            git pull --rebase origin main
            git stash pop
            git add site/dist state/seo-audit.json state/broken-links.json 2>/dev/null || true
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "maintenance: verify SEO and publish outputs $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy verified site to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-audit-${{ github.run_id }}
          path: |
            state/seo-audit.json
            state/broken-links.json
          retention-days: 30
          if-no-files-found: warn
