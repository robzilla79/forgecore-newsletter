name: Deploy Site Updates

on:
  workflow_dispatch:
  push:
    paths:
      - 'publish_site.py'
      - 'ai_search_hardening.py'
      - 'business_hardening.py'
      - 'verify_publish.py'
      - 'monetization/affiliate-registry.json'
      - '.github/workflows/deploy-site.yml'

concurrency:
  group: forgecore-site-deploy
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      PRIMARY_CTA_TEXT: Get the Solo Operator AI Workflow Pack
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://forge-daily.kit.com/232bce5a31' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      ENABLE_CLOUDFLARE_DEPLOY: '1'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render site from existing content
        run: python publish_site.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Verify site without sending email
        run: python verify_publish.py

      - name: Commit rendered site output
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add site/dist/
          if git diff --staged --quiet; then
            echo "No rendered site changes to commit"
          else
            git stash push --include-untracked --message forgecore-site-only-render
            git pull --rebase origin main
            git stash pop
            git add site/dist/
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: deploy site updates $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy site to Cloudflare Pages
        if: success() && env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main
