name: Deploy to Cloudflare Pages (Manual)

# Changed 2026-05-13: removed 'push: branches: main' trigger.
# Reason: generate.yml and rebuild-site.yml both deploy directly after publish.
# Auto-firing on every push caused race conditions with those deploys.
# This workflow is now a manual backup button only.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forgecore-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main
