name: Em Sends the Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: false
        type: string
        default: ''
    secrets:
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      KIT_SIGNUP_URL:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

concurrency:
  group: forgecore-send-${{ inputs.issue_slot || 'daily' }}
  cancel-in-progress: false

jobs:
  send:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot || '' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: Aware by Em
      NEWSLETTER_TAGLINE: AI seen clearly. Written by Em.
      PRIMARY_CTA_TEXT: Read Aware by Em
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: public
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm prepared issue exists and is not already sent
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from utils import issue_path_for_today

          def record_blocks_send(record):
              if not isinstance(record, dict):
                  return False
              return record.get("email_delivery") == "scheduled_or_sent" or record.get("mode") == "public"

          issue = issue_path_for_today()
          email = Path('content/email') / issue.name
          sent_log_path = Path('state/kit_sent.json')
          sent_log = {}
          if sent_log_path.exists():
              try:
                  sent_log = json.loads(sent_log_path.read_text(encoding='utf-8'))
              except Exception:
                  sent_log = {}
          existing = sent_log.get(issue.stem)
          already_sent = record_blocks_send(existing)

          print(f"Issue path: {issue}")
          print(f"Email snapshot path: {email}")
          print(f"Already sent: {already_sent}")

          if not issue.exists():
              raise SystemExit(f"Prepared issue not found. Run generate first: {issue}")
          if already_sent:
              print("Issue already sent. kit_publish.py will skip idempotently.")
          elif not email.exists():
              raise SystemExit(f"Locked email snapshot not found for unsent issue. Refusing to send: {email}")
          PY

      - name: Render current prepared web output
        run: python publish_site.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Render lead magnet assets
        run: python lead_magnet_hardening.py

      - name: Verify prepared issue before email
        run: python verify_publish.py

      - name: Send prepared issue to Kit once
        run: python kit_publish.py

      - name: Commit Kit sent log
        if: success()
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add state/kit_sent.json
          if git diff --staged --quiet; then
            echo "No Kit sent-log changes to commit"
          else
            git stash push --include-untracked --message aware-kit-sent-log
            git pull --rebase origin main
            git stash pop
            git add state/kit_sent.json
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "em: sent issue ${ISSUE_SLOT:-daily} to Kit $TIMESTAMP"
            git push
          fi
