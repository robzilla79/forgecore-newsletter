name: Em Sends the Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: false
        type: string
        default: ''
      issue_slug:
        required: false
        type: string
        default: ''
    secrets:
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      KIT_SIGNUP_URL:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

concurrency:
  group: forgecore-send-${{ inputs.issue_slug || inputs.issue_slot || 'daily' }}
  cancel-in-progress: false

jobs:
  send:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot || '' }}
      ISSUE_SLUG: ${{ inputs.issue_slug || '' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: Aware by Em
      NEWSLETTER_TAGLINE: AI seen clearly. Written by Em.
      PRIMARY_CTA_TEXT: Read Aware by Em
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: public
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare issue email and static site assets
        run: python prepare_issue_assets.py --issue-slug "${ISSUE_SLUG}"

      - name: Commit prepared issue assets
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add content/email site/dist
          if git diff --staged --quiet; then
            echo "No prepared issue assets to commit"
          else
            TARGET="${ISSUE_SLUG:-${ISSUE_SLOT:-daily}}"
            git commit -m "em: prepare issue assets for $TARGET"
            git push
          fi

      - name: Pull latest prepared assets before preflight
        run: git pull --rebase origin main

      - name: Confirm prepared issue exists and is not already sent or locked
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          from utils import issue_path_for_today

          def record_blocks_send(record):
              if not isinstance(record, dict):
                  return False
              return (
                  record.get("email_delivery") in {"scheduled_or_sent", "sending"}
                  or record.get("mode") == "public"
              )

          issue_slug = os.environ.get("ISSUE_SLUG", "").strip()
          if issue_slug:
              issue = Path("content/issues") / f"{issue_slug}.md"
          else:
              issue = issue_path_for_today()
          email = Path('content/email') / issue.name
          sent_log_path = Path('state/kit_sent.json')
          sent_log = {}
          if sent_log_path.exists():
              try:
                  sent_log = json.loads(sent_log_path.read_text(encoding='utf-8'))
              except Exception:
                  sent_log = {}
          existing = sent_log.get(issue.stem)
          already_blocked = record_blocks_send(existing)
          delivery = existing.get("email_delivery", "") if isinstance(existing, dict) else ""

          print(f"Issue path: {issue}")
          print(f"Email snapshot path: {email}")
          print(f"Already blocked: {already_blocked} (email_delivery={delivery!r})")

          if not issue.exists():
              print(f"ERROR: Prepared issue not found: {issue}")
              sys.exit(1)
          if already_blocked:
              print(f"STOP: Issue is already sent or locked (email_delivery={delivery!r}). Halting workflow.")
              sys.exit(1)
          if not email.exists():
              print(f"ERROR: Locked email snapshot not found. Refusing to send: {email}")
              sys.exit(1)
          print("Preflight passed.")
          PY

      - name: Verify prepared issue before email
        run: python verify_publish.py

      - name: Write pre-send lock
        run: python kit_publish.py --lock

      - name: Commit pre-send lock
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add state/kit_sent.json
          if git diff --staged --quiet; then
            echo "Lock already committed or issue already blocked — skipping."
          else
            git commit -m "em: pre-send lock for ${ISSUE_SLUG:-${ISSUE_SLOT:-daily}} [run $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT]"
            git push
          fi

      - name: Pull latest state before send
        run: git pull --rebase origin main

      - name: Send to Kit (locked)
        run: python kit_publish.py --send-locked

      - name: Commit final sent log
        if: success()
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add state/kit_sent.json
          if git diff --staged --quiet; then
            echo "No Kit sent-log changes to commit"
          else
            git stash push --include-untracked --message aware-kit-sent-log
            git pull --rebase origin main
            git stash pop
            git add state/kit_sent.json
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            TARGET="${ISSUE_SLUG:-${ISSUE_SLOT:-daily}}"
            git commit -m "em: sent issue $TARGET to Kit $TIMESTAMP"
            git push
          fi