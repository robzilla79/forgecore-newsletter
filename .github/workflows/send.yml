name: Send Prepared Newsletter Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: true
        type: string
    secrets:
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      KIT_SIGNUP_URL:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

concurrency:
  group: forgecore-send-${{ inputs.issue_slot }}
  cancel-in-progress: false

jobs:
  send:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: public
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm prepared slot issue exists
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from utils import issue_path_for_today, issue_slot, local_now, LOCAL_TZ_NAME

          SEND_WINDOWS = {
              "am": (10, 7),
              "pm": (16, 21),
          }

          def record_blocks_slot_email(record):
              if not isinstance(record, dict):
                  return False
              return record.get("email_delivery") == "scheduled_or_sent" or record.get("mode") == "public"

          def assert_send_window(slot, already_sent):
              if already_sent:
                  return
              hour_min = SEND_WINDOWS.get(slot)
              if not hour_min:
                  raise SystemExit(f"Unknown ISSUE_SLOT for send window: {slot!r}")
              now = local_now()
              current_minutes = now.hour * 60 + now.minute
              allowed_minutes = hour_min[0] * 60 + hour_min[1]
              print(f"Local time: {now.strftime('%Y-%m-%d %H:%M:%S %Z')} ({LOCAL_TZ_NAME})")
              print(f"Earliest allowed {slot.upper()} send time: {hour_min[0]:02d}:{hour_min[1]:02d} local")
              if current_minutes < allowed_minutes:
                  raise SystemExit(
                      f"Refusing early unsent {slot.upper()} email. "
                      f"Current local time is before {hour_min[0]:02d}:{hour_min[1]:02d}."
                  )

          slot = issue_slot()
          issue = issue_path_for_today()
          email = Path('content/email') / issue.name
          sent_log_path = Path('state/kit_sent.json')
          sent_log = {}
          if sent_log_path.exists():
              try:
                  sent_log = json.loads(sent_log_path.read_text(encoding='utf-8'))
              except Exception:
                  sent_log = {}
          existing = sent_log.get(issue.stem)
          already_sent = record_blocks_slot_email(existing)

          print(f"Prepared issue path: {issue}")
          print(f"Locked email path: {email}")
          print(f"Already sent record: {already_sent}")

          if not issue.exists():
              raise SystemExit(f"Prepared issue not found for ISSUE_SLOT. Refusing to send: {issue}")
          assert_send_window(slot, already_sent)
          if already_sent:
              print("Slot already has a public Kit record. Continuing so kit_publish.py can skip idempotently.")
          elif not email.exists():
              raise SystemExit(f"Locked email snapshot not found for unsent ISSUE_SLOT. Refusing to send: {email}")
          PY

      - name: Render current prepared web output
        run: python publish_site.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Render lead magnet assets
        run: python lead_magnet_hardening.py

      - name: Verify prepared AM issue before email
        if: env.ISSUE_SLOT != 'pm'
        run: python verify_publish.py

      - name: Verify prepared PM Brief before email
        if: env.ISSUE_SLOT == 'pm'
        run: python pm_verify_publish.py

      - name: Send prepared issue to Kit once
        run: python kit_publish.py

      - name: Commit Kit sent log
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add state/kit_sent.json
          if git diff --staged --quiet; then
            echo "No Kit sent-log changes to commit"
          else
            git stash push --include-untracked --message forgecore-kit-sent-log
            git pull --rebase origin main
            git stash pop
            git add state/kit_sent.json
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: record ${ISSUE_SLOT} Kit send $TIMESTAMP [bot]"
            git push
          fi
