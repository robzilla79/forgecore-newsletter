name: Recover PM Newsletter Issue

on:
  schedule:
    # Recovery check: 2:00 PM Central during daylight time, 1:00 PM Central during standard time.
    # If the PM issue was not generated by the normal PM preparation workflow, generate it here.
    - cron: '0 19 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'state/manual-pm-recovery.txt'
      - '.github/workflows/recover-pm-issue.yml'

permissions:
  contents: write
  actions: read

jobs:
  check-pm-issue:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      issue_path: ${{ steps.check.outputs.issue_path }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Check for today's PM issue
        id: check
        shell: bash
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          ISSUE="content/issues/${TODAY}-pm.md"
          echo "issue_path=${ISSUE}" >> "$GITHUB_OUTPUT"
          if [ -s "$ISSUE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "PM issue exists: $ISSUE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "PM issue missing: $ISSUE"
          fi

  recover-pm-issue:
    needs: check-pm-issue
    if: needs.check-pm-issue.outputs.exists != 'true'
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm

  report-existing:
    needs: check-pm-issue
    if: needs.check-pm-issue.outputs.exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report existing PM issue
        run: echo "PM issue already exists at ${{ needs.check-pm-issue.outputs.issue_path }}"
