name: Em Recover — PM Issue

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force regenerate even if PM issue exists'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-recover-pm-issue
  cancel-in-progress: true

jobs:
  recover-pm-issue:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm
