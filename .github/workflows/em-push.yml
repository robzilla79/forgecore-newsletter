name: Em Push — Local-Em Issue Upload

# Local-Em's dedicated upload path.
# Triggers when she drops a file into content/issues/ OR calls workflow_dispatch.
# No Ollama required. No quality gate. Just: she wrote it, it lands.

on:
  push:
    paths:
      - 'content/issues/**.md'
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue date (YYYY-MM-DD) — leave blank to auto-detect latest'
        required: false
        default: ''
      notify:
        description: 'Leave a note for the commit message'
        required: false
        default: 'Local-Em autonomous push'

concurrency:
  group: em-push
  cancel-in-progress: false

jobs:
  em-push:
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: 'public'
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync workspace
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fd --exclude='.venv'
          echo "[em-push] Synced to $(git rev-parse --short HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ ! -f ".venv/bin/python" ]; then
            python -m venv .venv
          fi
          .venv/bin/pip install -r requirements.txt --quiet

      - name: Detect issue file
        id: detect
        run: |
          INPUT_DATE="${{ github.event.inputs.issue_date }}"
          if [ -n "$INPUT_DATE" ]; then
            FILE="content/issues/${INPUT_DATE}.md"
            if [ -f "$FILE" ]; then
              echo "issue_file=$FILE" >> $GITHUB_OUTPUT
              echo "[em-push] Using specified file: $FILE"
            else
              echo "::error::Specified issue file $FILE not found"
              exit 1
            fi
          else
            # Auto-detect: find most recently modified YYYY-MM-DD.md
            FILE=$(ls -t content/issues/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].md 2>/dev/null | head -1)
            if [ -z "$FILE" ]; then
              echo "::error::No YYYY-MM-DD.md files found in content/issues/"
              exit 1
            fi
            echo "issue_file=$FILE" >> $GITHUB_OUTPUT
            echo "[em-push] Auto-detected: $FILE"
          fi

      - name: Render site HTML
        if: success()
        run: |
          echo "[em-push] Rendering site for ${{ steps.detect.outputs.issue_file }}"
          .venv/bin/python publish_site.py
        continue-on-error: true

      - name: Publish to Kit
        if: success()
        run: |
          echo "[em-push] Publishing ${{ steps.detect.outputs.issue_file }} to Kit"
          .venv/bin/python kit_publish.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "Local-Em"
          git config user.email "em@forgecore.co"
          git add content/issues/ site/dist/ state/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "[em-push] Nothing new to commit — already up to date"
          else
            NOTE="${{ github.event.inputs.notify }}"
            if [ -z "$NOTE" ]; then NOTE="Local-Em autonomous push"; fi
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "em-push: ${NOTE} — ${TIMESTAMP} [local-em]"
            git push
            echo "[em-push] ✅ Pushed successfully"
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main
        continue-on-error: true

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: em-push-log-${{ github.run_id }}
          path: |
            state/progress-log.md
            state/errors.log
            state/kit_sent.json
          retention-days: 7
          if-no-files-found: warn
