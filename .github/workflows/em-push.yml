name: Em Push — Direct Issue Upload

# Em's direct publish path. Reactivated 2026-05-12.
# This workflow lets Em (or Rob) push a hand-crafted issue directly into
# the production pipeline — bypassing the agent loop when the writing is already done.
# Active path: em-push.yml -> send.yml (deploy + send steps only).

on:
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Slot to publish: am or pm'
        required: true
        type: choice
        options:
          - am
          - pm
        default: am

permissions:
  contents: write

jobs:
  em-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Acknowledge Em push
        run: |
          echo "Em push triggered for slot: ${{ github.event.inputs.issue_slot }}"
          echo "Routing to production deploy and send pipeline."
          echo "This issue was written directly — no agent loop."

  deploy-and-send:
    needs: em-push
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: ${{ github.event.inputs.issue_slot }}
