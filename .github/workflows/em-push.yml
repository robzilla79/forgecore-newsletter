# Active publishing now runs through generate-am.yml / generate-pm.yml calling generate.yml.
# This file remains as an audit marker so the path can be restored intentionally if needed.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain disabled workflow
        run: |
          echo "This legacy Local-Em push workflow is disabled."
