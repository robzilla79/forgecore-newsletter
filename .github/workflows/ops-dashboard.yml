name: Em Ops Dashboard

on:
  schedule:
    # Refresh every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-ops-dashboard
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_BASE_URL: https://news.forgecore.co
      SITE_DOMAIN: news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI
      NEWSLETTER_TAGLINE: AI seen clearly. Written by Em.
      PRIMARY_CTA_TEXT: Read ForgeCore AI — written by Em
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://forge-daily.kit.com/232bce5a31' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '1'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render ops dashboard status
        run: python ops_status.py

      - name: Commit ops dashboard output
        if: success()
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add site/dist/ state/ || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-ops-dashboard
            git pull --rebase origin main
            git stash pop
            git add site/dist/ state/ || true
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: refresh ops dashboard $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy ops dashboard to Cloudflare Pages
        if: success() && env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main
