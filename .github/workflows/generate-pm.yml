name: Generate PM Newsletter Issue

on:
  schedule:
    # Target send window: 4:21 PM Central during daylight time, 3:21 PM Central during standard time.
    # GitHub cron runs in UTC; the odd minute avoids top-of-hour queue congestion.
    - cron: '21 21 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'state/manual-pm-run.txt'
      - '.github/workflows/generate-pm.yml'

permissions:
  contents: write
  actions: read

jobs:
  generate-pm:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm
