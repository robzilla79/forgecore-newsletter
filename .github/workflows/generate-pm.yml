name: Em Generates the PM Issue

on:
  schedule:
    # 1:30 PM Central (CDT = UTC-5, so 18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  prepare-pm:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm
