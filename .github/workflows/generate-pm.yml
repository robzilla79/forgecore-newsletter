name: Generate PM Newsletter Issue

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'state/manual-pm-run.txt'
      - '.github/workflows/generate-pm.yml'

permissions:
  contents: write
  actions: read

jobs:
  generate-pm:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm
