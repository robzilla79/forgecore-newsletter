name: Prepare PM Newsletter Issue

on:
  schedule:
    # Prepare window: 1:30 PM Central during daylight time, 12:30 PM Central during standard time.
    # Email delivery happens later in send-pm.yml.
    - cron: '30 18 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'state/manual-pm-run.txt'
      - '.github/workflows/generate-pm.yml'

permissions:
  contents: write
  actions: read

jobs:
  prepare-pm:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: pm
