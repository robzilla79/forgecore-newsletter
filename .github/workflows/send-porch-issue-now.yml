name: Send Porch Issue Now

on:
  push:
    paths:
      - '.github/workflows/send-porch-issue-now.yml'
      - 'content/email/2026-05-21-em.md'
      - 'site/dist/2026-05-21-em/index.html'
      - 'state/send-porch-issue-now.trigger'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  send-porch:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: ''
      issue_slug: '2026-05-21-em'
