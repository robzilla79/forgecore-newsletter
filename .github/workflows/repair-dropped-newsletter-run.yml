name: Em Repair — Dropped Issue Run

on:
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Slot to repair: am or pm'
        required: true
        type: choice
        options:
          - am
          - pm
        default: am
      skip_send:
        description: 'Skip email send (prepare only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-repair-${{ github.event.inputs.issue_slot }}
  cancel-in-progress: false

jobs:
  repair-prepare:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: ${{ github.event.inputs.issue_slot }}

  repair-send:
    needs: repair-prepare
    if: github.event.inputs.skip_send != 'true'
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: ${{ github.event.inputs.issue_slot }}
