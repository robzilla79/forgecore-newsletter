name: Em Prepares Daily Issue

on:
  schedule:
    # 7:00 AM CDT (UTC-5) = 12:00 UTC
    # Adjust to 13:00 UTC when Central Standard Time (UTC-6) is in effect.
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read

jobs:
  prepare-daily:
    uses: ./.github/workflows/generate.yml
    secrets: inherit
    with:
      issue_slot: ''
