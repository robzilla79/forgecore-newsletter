name: Em Sends Daily Issue

# Send is manual-only until the daily lane is trusted.
# To automate, add a schedule cron here:
#   - cron: '0 15 * * *'   # 10:00 AM CDT (UTC-5) = 15:00 UTC
on:
  workflow_dispatch:
    inputs:
      issue_slug:
        description: "Optional explicit issue slug to send, e.g. 2026-05-13-em"
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  send-daily:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: ''
      issue_slug: ${{ inputs.issue_slug || '' }}
