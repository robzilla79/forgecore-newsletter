name: Em Sends Daily Issue

# Daily automated send.
# GitHub Actions cron uses UTC. 15:07 UTC = 10:07 AM Central during daylight time.
# The odd minute avoids sending exactly on the hour with everybody else.
on:
  schedule:
    - cron: '7 15 * * *'
  workflow_dispatch:
    inputs:
      issue_slug:
        description: "Optional explicit issue slug to send, e.g. 2026-05-13-em"
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  send-daily:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: ''
      issue_slug: ${{ inputs.issue_slug || '' }}
