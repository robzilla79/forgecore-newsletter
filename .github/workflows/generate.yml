name: Generate Newsletter Issue

on:
  schedule:
    # 7 AM CDT (12:00 UTC) and 7 PM CDT (00:00 UTC next day)
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'qwen2.5:14b-instruct' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gemma3:12b' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gemma3:12b' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'qwen3:8b' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forgecore-newsletter.beehiiv.com/
      BEEHIIV_PUBLICATION_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '0'
      MAX_CONTEXT_CHARS: '22000'
      OLLAMA_TIMEOUT: '300'
      OLLAMA_RETRIES: '3'
      AUTO_REPAIR_PATHS: '1'
      MAX_ARTICLES_PER_RUN: '8'
      MAX_FEED_ITEMS_PER_SOURCE: '8'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      BEEHIIV_EMBED_HTML: ${{ secrets.BEEHIIV_EMBED_HTML }}
      MIN_IMPROVEMENT_INTERVAL_MINUTES: '0'
      MAX_ISSUES_TO_IMPROVE: '1'
      # Beehiiv auto-send credentials (add these as GitHub secrets)
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
      BEEHIIV_SEND_MODE: 'confirmed'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync workspace with remote (self-hosted runner)
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "Workspace synced to $(git rev-parse --short HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Ollama is listening on all interfaces
        run: |
          echo "[ollama-restart] Killing any existing Ollama process..."
          powershell.exe -Command "Stop-Process -Name 'ollama' -Force -ErrorAction SilentlyContinue"
          sleep 2

          echo "[ollama-restart] Starting Ollama with OLLAMA_HOST=0.0.0.0..."
          powershell.exe -Command "\$env:OLLAMA_HOST='0.0.0.0'; Start-Process -FilePath 'ollama' -ArgumentList 'serve' -WindowStyle Hidden"
          sleep 5

          echo "[ollama-restart] Waiting for Ollama to be ready..."
          OLLAMA_WIN_URL="http://172.27.0.1:11434"
          for i in $(seq 1 6); do
            if curl -sf --max-time 5 "$OLLAMA_WIN_URL/api/tags" > /dev/null 2>&1; then
              echo "OLLAMA_URL=$OLLAMA_WIN_URL" >> $GITHUB_ENV
              echo "[ollama-restart] Ollama is up at $OLLAMA_WIN_URL"
              break
            fi
            echo "[ollama-restart] Not ready yet ($i/6)"
            sleep 5
          done

          if ! curl -sf --max-time 10 "$OLLAMA_WIN_URL/api/tags" > /dev/null 2>&1; then
            echo "::error::Ollama failed to start on $OLLAMA_WIN_URL"
            exit 1
          fi

      - name: Check if Ollama is reachable
        id: ollama_check
        run: |
          if curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "reachable=true" >> $GITHUB_OUTPUT
            echo "[ollama] reachable at initial check"
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "::warning::Ollama not reachable at $OLLAMA_URL - will skip LLM steps"
          fi

      - name: Run web research
        run: python web_research.py
        continue-on-error: true

      - name: Run scout agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "::error::Ollama dropped before scout agent - was reachable at job start but is gone now. Check if your PC slept, WSL reset, or the tunnel expired."
            exit 1
          fi
          python agent_loop.py scout
        continue-on-error: true

      - name: Run analyst agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "::error::Ollama dropped before analyst agent - was reachable at job start but is gone now."
            exit 1
          fi
          python agent_loop.py analyst
        continue-on-error: true

      - name: Run author agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "::error::Ollama dropped before author agent - was reachable at job start but is gone now."
            exit 1
          fi
          python agent_loop.py author
        continue-on-error: true

      - name: Run editor agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "::error::Ollama dropped before editor agent - was reachable at job start but is gone now."
            exit 1
          fi
          python agent_loop.py editor
        continue-on-error: true

      - name: Create fallback stub issue (Ollama offline)
        if: steps.ollama_check.outputs.reachable != 'true'
        run: python create_stub_issue.py

      - name: Improve issue until quality gate passes (max 5 passes)
        if: steps.ollama_check.outputs.reachable == 'true'
        run: python improve_until_passes.py

      - name: Run quality gate (final check)
        if: steps.ollama_check.outputs.reachable != 'true'
        run: python quality_gate.py
        continue-on-error: true

      - name: Publish site (render HTML)
        if: success()
        run: python publish_site.py
        continue-on-error: false

      - name: Publish to Beehiiv (auto-send to subscribers)
        if: success()
        run: python beehiiv_publish.py
        continue-on-error: true

      - name: Commit generated content
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: newsletter issue $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Dump errors.log on failure
        if: failure()
        run: |
          echo "=== state/errors.log ==="
          cat state/errors.log 2>/dev/null || echo "(no errors.log found)"
          echo "=== state/progress-log.md ==="
          cat state/progress-log.md 2>/dev/null || echo "(no progress-log.md found)"

      - name: Upload progress log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-log-${{ github.run_id }}
          path: |
            state/progress-log.md
            state/errors.log
            state/improvement-log.md
            state/beehiiv_sent.json
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
