name: Generate Newsletter Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: false
        type: string
        default: ''
    secrets:
      OPENAI_API_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      RESEARCH_MODEL:
        required: false
      WRITER_MODEL:
        required: false
      EDITOR_MODEL:
        required: false
      CRITIC_MODEL:
        required: false
      FALLBACK_MODEL:
        required: false
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Issue slot: am or pm. Leave blank for legacy YYYY-MM-DD filename.'
        required: false
        default: ''
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

concurrency:
  group: forgecore-newsletter-${{ inputs.issue_slot || github.event.inputs.issue_slot || 'manual' }}
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot || github.event.inputs.issue_slot }}
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'gpt-4o-mini' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gpt-4o-mini' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gpt-4o-mini' }}
      CRITIC_MODEL: ${{ secrets.CRITIC_MODEL || 'gpt-4o-mini' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'gpt-4o-mini' }}
      MIN_CRITIC_OVERALL: '6.5'
      MIN_CRITIC_CATEGORY: '6.0'
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '0'
      MAX_CONTEXT_CHARS: '22000'
      AUTO_REPAIR_PATHS: '1'
      MAX_ARTICLES_PER_RUN: '12'
      MAX_FEED_ITEMS_PER_SOURCE: '12'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      MIN_IMPROVEMENT_INTERVAL_MINUTES: '0'
      MAX_ISSUES_TO_IMPROVE: '1'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: 'draft'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run web research
        run: python web_research.py
        continue-on-error: true

      - name: Run scout agent
        run: python agent_loop.py scout

      - name: Run analyst agent
        run: python agent_loop.py analyst

      - name: Run author agent
        run: python agent_loop.py author

      - name: Run editor agent
        run: python agent_loop.py editor

      - name: Improve issue until quality gate passes
        run: python improve_until_passes.py

      - name: Run quality gate
        run: python quality_gate.py

      - name: Publish site
        run: python publish_site.py

      - name: Write CI HEARTBEAT
        if: always()
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          printf '# Last Run Status: %s\n- Origin: GitHub Actions (%s)\n- Run ID: %s\n- Issue slot: %s\n- Models: research=%s, writer=%s, editor=%s, fallback=%s\n' \
            "$TIMESTAMP" "${{ github.workflow }}" "${{ github.run_id }}" "${ISSUE_SLOT:-default}" \
            "${RESEARCH_MODEL:-gpt-4o-mini}" "${WRITER_MODEL:-gpt-4o-mini}" \
            "${EDITOR_MODEL:-gpt-4o-mini}" "${FALLBACK_MODEL:-gpt-4o-mini}" \
            > HEARTBEAT.md
          echo "[heartbeat] Written for $TIMESTAMP"

      - name: Commit generated content
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git pull --rebase origin main
          git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: ${ISSUE_SLOT:-manual} newsletter issue $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Dump recent logs on failure
        if: failure()
        run: |
          echo "=== recent state/errors.log ==="
          tail -n 80 state/errors.log 2>/dev/null || echo "(no errors.log found)"
          echo "=== recent state/progress-log.md ==="
          tail -n 80 state/progress-log.md 2>/dev/null || echo "(no progress-log.md found)"
          echo "=== recent state/improvement-log.md ==="
          tail -n 80 state/improvement-log.md 2>/dev/null || echo "(no improvement-log.md found)"

      - name: Upload progress log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-log-${{ github.run_id }}
          path: |
            state/progress-log.md
            state/errors.log
            state/improvement-log.md
            state/kit_sent.json
            content/issues/*.md
            research/briefs/*.md
            research/raw/*.md
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
