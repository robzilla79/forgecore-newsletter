name: Generate Newsletter Issue

on:
  schedule:
    # 7 AM CDT (12:00 UTC) and 7 PM CDT (00:00 UTC next day)
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'qwen2.5:14b-instruct' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gemma3:12b' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gemma3:12b' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'qwen3:8b' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forgecore-newsletter.beehiiv.com/
      BEEHIIV_PUBLICATION_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '0'
      MAX_CONTEXT_CHARS: '22000'
      OLLAMA_TIMEOUT: '300'
      OLLAMA_RETRIES: '3'
      AUTO_REPAIR_PATHS: '1'
      MAX_ARTICLES_PER_RUN: '8'
      MAX_FEED_ITEMS_PER_SOURCE: '8'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if Ollama is reachable
        id: ollama_check
        run: |
          if curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null; then
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "::warning::Ollama not reachable at $OLLAMA_URL - will skip LLM steps"
          fi

      - name: Run web research
        run: python web_research.py
        continue-on-error: true

      - name: Run scout agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: python agent_loop.py scout
        continue-on-error: true

      - name: Run analyst agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: python agent_loop.py analyst
        continue-on-error: true

      - name: Run author agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: python agent_loop.py author
        continue-on-error: true

      - name: Run editor agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: python agent_loop.py editor
        continue-on-error: true

        - name: Create fallback stub issue (Ollama offline)
          if: steps.ollama_check.outputs.reachable != 'true'
          run: |
            TODAY=$(date -u '+%Y-%m-%d')
            ISSUE_PATH="content/issues/${TODAY}.md"
            if [ ! -f "$ISSUE_PATH" ]; then
              cat > "$ISSUE_PATH" << 'STUB'
            # ForgeCore AI Dispatch — $TODAY

            ## Hook
            Today's AI landscape continues to shift rapidly. Operators who build repeatable systems outperform those chasing individual tools.

            ## Top Story
            Local AI deployment is accelerating as teams look for privacy-preserving, cost-effective alternatives to cloud APIs. Ollama and similar runtimes are at the center of this shift.

            ## Why It Matters
            - Local models eliminate per-token cost and keep sensitive data on-premise.
            - Reproducible pipelines matter more than raw model capability for most business tasks.
            - Teams building internal tools with open-weight models are compounding faster.

            ## Highlights
            - Llama 3 variants continue to lead open-weight benchmarks for instruction following.
            - Claude and GPT-4o remain dominant for long-context reasoning tasks.
            - Fine-tuned 7B models now match GPT-3.5 on many vertical-specific workflows.

            ## Tool of the Week
            Ollama — run Llama, Mistral, Gemma, and others locally with a single CLI command. Ideal for private inference, agent pipelines, and cost control.

            ## Workflow
            ```bash
            # Pull a model and run it locally
            ollama pull gemma3:12b
            ollama run gemma3:12b

            # Integrate with Python
            pip install ollama
            python -c "import ollama; print(ollama.chat('gemma3:12b', [{'role':'user','content':'Summarize today in AI'}]))"
            ```

            ## CTA
            Pick one local model this week, run it against a real task, and measure the output quality against your current tool.

            ## Sources
            - No live sources available for this run (offline mode).
            STUB
              echo "Created stub issue: $ISSUE_PATH"
            else
              echo "Issue already exists: $ISSUE_PATH — skipping stub"
            fi
      - name: Run quality gate
        run: python quality_gate.py
        continue-on-error: true

      - name: Publish site (render HTML)
        run: python publish_site.py
        continue-on-error: false

      - name: Commit generated content
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: newsletter issue $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Upload progress log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-log-${{ github.run_id }}
          path: |
            state/progress-log.md
            state/errors.log
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
