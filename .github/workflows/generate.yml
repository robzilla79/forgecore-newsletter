name: Generate Newsletter Issue

on:
  schedule:
    # 7 AM CDT (12:00 UTC) and 7 PM CDT (00:00 UTC next day)
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

concurrency:
  group: forgecore-newsletter-main
  cancel-in-progress: true
jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      OLLAMA_URL: http://localhost:11434
      # Default model profile tuned for editorial quality.
      # qwen3:14b yields materially stronger structure, depth, and source-aware synthesis
      # than lightweight defaults for operator-grade longform issues.
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'qwen3:14b' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'qwen3:14b' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'qwen3:14b' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'qwen3:8b' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forgecore-newsletter.beehiiv.com/
      BEEHIIV_PUBLICATION_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '0'
      MAX_CONTEXT_CHARS: '22000'
      OLLAMA_TIMEOUT: '420'
      OLLAMA_RETRIES: '3'
      AUTO_REPAIR_PATHS: '1'
      MAX_ARTICLES_PER_RUN: '12'
      MAX_FEED_ITEMS_PER_SOURCE: '12'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      BEEHIIV_EMBED_HTML: ${{ secrets.BEEHIIV_EMBED_HTML }}
      MIN_IMPROVEMENT_INTERVAL_MINUTES: '0'
      MAX_ISSUES_TO_IMPROVE: '1'
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
      BEEHIIV_SEND_MODE: 'confirmed'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync workspace with remote (self-hosted runner)
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fd --exclude='.venv'
          echo "Workspace synced to $(git rev-parse --short HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ ! -f ".venv/bin/python" ]; then
            echo "[venv] Creating fresh .venv"
            python -m venv .venv
          fi
          .venv/bin/pip install -r requirements.txt

      - name: Check if Ollama is reachable
        id: ollama_check
        run: |
          if curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "reachable=true" >> $GITHUB_OUTPUT
            echo "[ollama] confirmed reachable at $OLLAMA_URL"
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "::warning::Ollama not reachable at $OLLAMA_URL — agents will be skipped, fallback stub will run"
          fi

      - name: Ensure Ollama models are pulled
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          set -e
          echo "[ollama] Pulling $RESEARCH_MODEL ..."
          ollama pull "$RESEARCH_MODEL"
          if [ "$WRITER_MODEL" != "$RESEARCH_MODEL" ]; then
            echo "[ollama] Pulling $WRITER_MODEL ..."
            ollama pull "$WRITER_MODEL"
          fi
          if [ "$EDITOR_MODEL" != "$RESEARCH_MODEL" ] && [ "$EDITOR_MODEL" != "$WRITER_MODEL" ]; then
            echo "[ollama] Pulling $EDITOR_MODEL ..."
            ollama pull "$EDITOR_MODEL"
          fi
          if [ "$FALLBACK_MODEL" != "$RESEARCH_MODEL" ] && [ "$FALLBACK_MODEL" != "$WRITER_MODEL" ] && [ "$FALLBACK_MODEL" != "$EDITOR_MODEL" ]; then
            echo "[ollama] Pulling $FALLBACK_MODEL ..."
            ollama pull "$FALLBACK_MODEL"
          fi
          echo "[ollama] Models ready:"
          ollama list

      - name: Warm up Ollama model
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          echo "[ollama] Warming up $RESEARCH_MODEL ..."
          curl -sf --max-time 120 "$OLLAMA_URL/api/generate" \
            -d "{\"model\":\"$RESEARCH_MODEL\",\"prompt\":\"hi\",\"stream\":false,\"options\":{\"num_predict\":1}}" \
            > /dev/null && echo "[ollama] Warm-up OK" || echo "::warning::Warm-up failed — proceeding anyway"
          sleep 5

      - name: Run web research
        run: .venv/bin/python web_research.py
        continue-on-error: true

      - name: Run scout agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "::error::Ollama dropped before scout agent."
            exit 1
          fi
          .venv/bin/python agent_loop.py scout
        continue-on-error: true

      - name: Run analyst agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "::error::Ollama dropped before analyst agent."
            exit 1
          fi
          .venv/bin/python agent_loop.py analyst
        continue-on-error: true

      - name: Run author agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "::error::Ollama dropped before author agent."
            exit 1
          fi
          .venv/bin/python agent_loop.py author
        continue-on-error: true

      - name: Run editor agent
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          if ! curl -sf --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "::error::Ollama dropped before editor agent."
            exit 1
          fi
          .venv/bin/python agent_loop.py editor
        continue-on-error: true

      - name: Create fallback stub issue (Ollama offline)
        if: steps.ollama_check.outputs.reachable != 'true'
        run: .venv/bin/python create_stub_issue.py

      - name: Improve issue until quality gate passes (max 5 passes)
        if: steps.ollama_check.outputs.reachable == 'true'
        run: .venv/bin/python improve_until_passes.py

      - name: Run quality gate (final check)
        run: |
          if [ "${{ steps.ollama_check.outputs.reachable }}" = "true" ]; then
            .venv/bin/python quality_gate.py
          else
            echo "::warning::Ollama offline fallback path: disabling critic requirement for stub issue quality gate"
            REQUIRE_CRITIC_REVIEW=0 .venv/bin/python quality_gate.py
          fi
        continue-on-error: false

      - name: Publish site (render HTML)
        if: success()
        run: .venv/bin/python publish_site.py
        continue-on-error: false

      - name: Publish to Beehiiv (auto-send to subscribers)
        if: success()
        run: .venv/bin/python beehiiv_publish.py
        continue-on-error: true

      - name: Commit generated content
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: newsletter issue $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Dump errors.log on failure
        if: failure()
        run: |
          echo "=== state/errors.log ==="
          cat state/errors.log 2>/dev/null || echo "(no errors.log found)"
          echo "=== state/progress-log.md ==="
          cat state/progress-log.md 2>/dev/null || echo "(no progress-log.md found)"

      - name: Upload progress log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-log-${{ github.run_id }}
          path: |
            state/progress-log.md
            state/errors.log
            state/improvement-log.md
            state/beehiiv_sent.json
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
