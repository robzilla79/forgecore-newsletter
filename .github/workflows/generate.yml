name: Prepare Newsletter Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: false
        type: string
        default: ''
    secrets:
      OPENAI_API_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      KIT_SIGNUP_URL:
        required: false
      RESEARCH_MODEL:
        required: false
      WRITER_MODEL:
        required: false
      EDITOR_MODEL:
        required: false
      CRITIC_MODEL:
        required: false
      FALLBACK_MODEL:
        required: false
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Issue slot: am or pm. Leave blank for legacy YYYY-MM-DD filename.'
        required: false
        default: ''
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

concurrency:
  group: forgecore-prepare-${{ inputs.issue_slot || github.event.inputs.issue_slot || 'manual' }}
  cancel-in-progress: true

jobs:
  prepare:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot || github.event.inputs.issue_slot }}
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'gpt-4o-mini' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gpt-4o-mini' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gpt-4o-mini' }}
      CRITIC_MODEL: ${{ secrets.CRITIC_MODEL || 'gpt-4o-mini' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'gpt-4o-mini' }}
      MIN_CRITIC_OVERALL: '6.5'
      MIN_CRITIC_CATEGORY: '6.0'
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      SPONSOR_EMAIL: sponsors@forgecore.co
      ENABLE_CLOUDFLARE_DEPLOY: '1'
      MAX_CONTEXT_CHARS: '22000'
      AUTO_REPAIR_PATHS: '0'
      MAX_ARTICLES_PER_RUN: '12'
      MAX_FEED_ITEMS_PER_SOURCE: '12'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      MIN_IMPROVEMENT_INTERVAL_MINUTES: '0'
      MAX_ISSUES_TO_IMPROVE: '1'
      MIN_RESEARCH_FILES: '3'
      MIN_RESEARCH_URLS: '5'
      MIN_RESEARCH_DOMAINS: '3'
      MIN_OPERATOR_SIGNALS: '4'
      MAX_SINGLE_DOMAIN_SHARE: '0.65'
      MAX_AFFILIATE_LINKS_PER_ISSUE: '1'
      MIN_EDITORIAL_SOURCES: '3'
      MIN_RELEVANT_SOURCES: '2'
      POST_DEPLOY_RETRIES: '6'
      POST_DEPLOY_RETRY_DELAY_SECONDS: '15'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run web research
        run: python web_research.py

      - name: Research quality gate
        run: python research_quality_gate.py

      - name: Run scout agent
        run: python agent_loop.py scout

      - name: Run analyst agent
        run: python agent_loop.py analyst

      - name: Run author agent
        run: python agent_loop.py author

      - name: Run editor agent
        run: python agent_loop.py editor

      - name: Improve issue until quality gate passes
        run: python improve_until_passes.py

      - name: Verify critic consistency
        run: python critic_consistency_gate.py

      - name: Run quality gate
        run: python quality_gate.py

      - name: Run source relevance gate
        run: python source_relevance_gate.py

      - name: Activate approved affiliate links
        run: python affiliate_linker.py

      - name: Run monetization guard
        run: python monetization_guard.py

      - name: Lock email snapshot
        run: python lock_email_issue.py

      - name: Quarantine legacy or low-quality public issues
        run: python content_cleanup.py

      - name: Publish site
        run: python publish_site.py

      - name: Apply visual hardening
        run: python visual_hardening.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Render lead magnet assets
        run: python lead_magnet_hardening.py

      - name: Render ops dashboard status
        run: python ops_status.py

      - name: Verify publish
        run: python verify_publish.py

      - name: Summarize failure artifacts
        if: failure()
        run: |
          {
            echo "## ForgeCore newsletter preparation failed"
            echo ""
            echo "Issue slot: ${ISSUE_SLOT:-manual}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "### Generated issue files"
            find content/issues content/email -maxdepth 1 -type f -name '*.md' -print | sort || true
            echo ""
            echo "### State artifacts"
            find state -maxdepth 1 -type f \( -name '*.json' -o -name '*.log' -o -name '*.md' \) -print | sort || true
            echo ""
            echo "### Research artifacts"
            find research -maxdepth 2 -type f -print | sort || true
          } | tee failure-summary.md

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forgecore-prepare-failure-${{ env.ISSUE_SLOT || 'manual' }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            failure-summary.md
            content/issues/*.md
            content/email/*.md
            research/raw/*.md
            research/briefs/*.md
            state/*.json
            state/*.log
            state/*.md
            site/dist/index.html
            site/dist/rss.xml
            site/dist/sitemap.xml
            site/dist/ops/index.html
            site/dist/status/forgecore-status.json

      - name: Commit prepared content
        if: success()
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ content/email/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-prepared-content
            git pull --rebase origin main
            git stash pop
            git add content/issues/ content/email/ research/ state/ site/dist/ HEARTBEAT.md
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: prepare ${ISSUE_SLOT:-manual} newsletter issue $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy prepared web version to Cloudflare Pages
        if: success() && env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Verify live Cloudflare publish
        if: success() && env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        run: python post_deploy_smoke.py
