name: Em Prepares the Issue

on:
  workflow_call:
    inputs:
      issue_slot:
        required: false
        type: string
        default: 'pm'
    secrets:
      OPENAI_API_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      KIT_API_KEY:
        required: false
      KIT_FORM_ID:
        required: false
      KIT_SIGNUP_URL:
        required: false
      WRITER_MODEL:
        required: false
      EDITOR_MODEL:
        required: false
  workflow_dispatch:
    inputs:
      issue_slot:
        description: 'Issue slot: am or pm'
        required: false
        default: 'pm'
      force_run:
        description: 'Force run even if recent issue exists'
        required: false
        default: 'false'

concurrency:
  group: forgecore-prepare-${{ inputs.issue_slot || github.event.inputs.issue_slot || 'pm' }}
  cancel-in-progress: true

jobs:
  prepare:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ISSUE_SLOT: ${{ inputs.issue_slot || github.event.inputs.issue_slot || 'pm' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gpt-4o' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gpt-4o' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI
      NEWSLETTER_TAGLINE: AI seen clearly. Written by Em.
      SPONSOR_EMAIL: sponsors@forgecore.co
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://news.forgecore.co/' }}
      ENABLE_CLOUDFLARE_DEPLOY: '1'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1 — Research
      - name: Research
        run: python web_research.py

      # Step 2 — Write (author reads em/VOICE.md directly)
      - name: Write
        run: python agent_loop.py author

      # Step 3 — Edit (one pass, hard reject on sections/headers)
      - name: Edit
        run: python agent_loop.py editor

      # Step 4 — Publish to site
      - name: Publish site
        run: python publish_site.py

      - name: Deploy to Cloudflare Pages
        if: success() && env.ENABLE_CLOUDFLARE_DEPLOY == '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Summarize failure
        if: failure()
        run: |
          {
            echo "## Em hit a wall — issue preparation failed"
            echo ""
            echo "Issue slot: ${ISSUE_SLOT}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            find content/issues -maxdepth 1 -type f -name '*.md' | sort || true
            find state -maxdepth 1 -type f | sort || true
          } | tee failure-summary.md

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forgecore-failure-${{ env.ISSUE_SLOT }}-${{ github.run_id }}
          retention-days: 7
          path: |
            failure-summary.md
            content/issues/*.md
            state/*.json
            state/*.log

      - name: Commit prepared content
        if: success()
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-prepared-content
            git pull --rebase origin main
            git stash pop
            git add content/issues/ research/ state/ site/dist/ HEARTBEAT.md
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "em: prepared ${ISSUE_SLOT} issue $TIMESTAMP"
            git push
          fi
