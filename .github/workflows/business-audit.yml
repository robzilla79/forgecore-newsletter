name: Em Daily Business Audit

# Runs the lean business audit only.
# This does not generate newsletters or send email.
# Triggered daily at 6 PM CDT (23:00 UTC), or manually.

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      paths:
        description: 'Changed paths (space-separated, optional)'
        required: false
        default: ''
      triggering_files:
        description: 'Triggering files for audit (optional)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: forgecore-business-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE_BASE_URL: https://news.forgecore.co
      SITE_DOMAIN: news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI
      NEWSLETTER_TAGLINE: AI seen clearly. Written by Em.
      PRIMARY_CTA_TEXT: Read ForgeCore AI — written by Em
      PRIMARY_CTA_URL: ${{ secrets.KIT_SIGNUP_URL || 'https://forge-daily.kit.com/232bce5a31' }}
      SPONSOR_EMAIL: sponsors@forgecore.co

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quarantine legacy or low-quality public issues
        run: python content_cleanup.py

      - name: Render current site snapshot for audit
        run: python publish_site.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Render lead magnet assets
        run: python lead_magnet_hardening.py

      - name: Verify site update surface
        run: python verify_publish.py

      - name: Run lean business audit
        run: python lean_business_audit.py

      - name: Commit audit report, cleanup, and rendered site output
        run: |
          git config user.name "Em (EternalMind)"
          git config user.email "em@forgecore.co"
          git add site/dist/ state/ content/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git stash push --include-untracked --message forgecore-business-audit
            git pull --rebase origin main
            git stash pop
            git add site/dist/ state/ content/
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: daily business audit $TIMESTAMP [bot]"
            git push
          fi
