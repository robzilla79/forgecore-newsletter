name: Patch PM Publish Contract

on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_publish_site_pm_contract.py'
      - '.github/workflows/patch-pm-publish-contract.yml'
      - 'state/manual-pm-publish-patch.txt'

permissions:
  contents: write
  actions: read

jobs:
  patch-render-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ISSUE_SLOT: pm
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://news.forgecore.co/
      SPONSOR_EMAIL: sponsors@forgecore.co
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Patch PM Brief contract into renderer
        run: python patch_publish_site_pm_contract.py

      - name: Render static site
        run: python publish_site.py

      - name: Apply AI search hardening
        run: python ai_search_hardening.py

      - name: Apply business hardening
        run: python business_hardening.py

      - name: Render lead magnet assets
        run: python lead_magnet_hardening.py

      - name: Verify PM Brief publish output
        run: python pm_verify_publish.py

      - name: Commit PM publish contract and rendered output
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add publish_site.py site/dist/ patch_publish_site_pm_contract.py
          if git diff --staged --quiet; then
            echo "No PM publish contract changes to commit"
          else
            git stash push --include-untracked --message forgecore-pm-publish-contract
            git pull --rebase origin main
            git stash pop
            git add publish_site.py site/dist/ patch_publish_site_pm_contract.py
            git commit -m "fix: include PM Brief issues in homepage RSS and sitemap"
            git push
          fi
