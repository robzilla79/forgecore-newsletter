name: Continuous Improvement Loop

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: forgecore-newsletter-improve
  cancel-in-progress: true

jobs:
  improve:
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      OLLAMA_URL: http://localhost:11434
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'qwen3:14b' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'qwen3:14b' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'qwen3:14b' }}
      CRITIC_MODEL: ${{ secrets.CRITIC_MODEL || 'qwen3:14b' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'qwen3:8b' }}
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forge-daily.kit.com/
      BEEHIIV_PUBLICATION_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      MAX_CONTEXT_CHARS: '22000'
      OLLAMA_TIMEOUT: '180'
      OLLAMA_RETRIES: '2'
      AUTO_REPAIR_PATHS: '1'
      MIN_CRITIC_OVERALL: '8.0'
      MIN_CRITIC_CATEGORY: '7.0'
      MAX_TARGETED_REWRITE_ITEMS: '6'
      MAX_ARTICLES_PER_RUN: '4'
      MAX_FEED_ITEMS_PER_SOURCE: '4'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      BEEHIIV_EMBED_HTML: ${{ secrets.BEEHIIV_EMBED_HTML }}
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
      BEEHIIV_SEND_MODE: 'draft'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync workspace with remote (self-hosted runner)
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fd --exclude='.venv'
          echo "Workspace synced to $(git rev-parse --short HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ ! -f ".venv/bin/python" ]; then
            echo "[venv] Creating fresh .venv"
            python -m venv .venv
          fi
          .venv/bin/pip install -r requirements.txt

      - name: Check if Ollama is reachable
        id: ollama_check
        run: |
          if curl -sf --max-time 5 "$OLLAMA_URL/api/tags" > /dev/null 2>&1; then
            echo "reachable=true" >> $GITHUB_OUTPUT
            echo "[ollama] confirmed reachable at $OLLAMA_URL"
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "::warning::Ollama not reachable at $OLLAMA_URL — skipping improvement loop"
          fi

      - name: Ensure Ollama models are pulled
        if: steps.ollama_check.outputs.reachable == 'true'
        run: |
          set -e
          echo "[ollama] Pulling $RESEARCH_MODEL ..."
          ollama pull "$RESEARCH_MODEL"
          if [ "$WRITER_MODEL" != "$RESEARCH_MODEL" ]; then
            echo "[ollama] Pulling $WRITER_MODEL ..."
            ollama pull "$WRITER_MODEL"
          fi
          if [ "$EDITOR_MODEL" != "$RESEARCH_MODEL" ] && [ "$EDITOR_MODEL" != "$WRITER_MODEL" ]; then
            echo "[ollama] Pulling $EDITOR_MODEL ..."
            ollama pull "$EDITOR_MODEL"
          fi
          if [ "$CRITIC_MODEL" != "$RESEARCH_MODEL" ] && [ "$CRITIC_MODEL" != "$WRITER_MODEL" ] && [ "$CRITIC_MODEL" != "$EDITOR_MODEL" ]; then
            echo "[ollama] Pulling $CRITIC_MODEL ..."
            ollama pull "$CRITIC_MODEL"
          fi
          if [ "$FALLBACK_MODEL" != "$RESEARCH_MODEL" ] && [ "$FALLBACK_MODEL" != "$WRITER_MODEL" ] && [ "$FALLBACK_MODEL" != "$EDITOR_MODEL" ] && [ "$FALLBACK_MODEL" != "$CRITIC_MODEL" ]; then
            echo "[ollama] Pulling $FALLBACK_MODEL ..."
            ollama pull "$FALLBACK_MODEL"
          fi
          echo "[ollama] Models ready:"
          ollama list

      - name: Run improvement controller
        id: improve_controller
        if: steps.ollama_check.outputs.reachable == 'true'
        env:
          IMPROVEMENT_ORIGIN: improve
        run: |
          .venv/bin/python improve_until_passes.py

      - name: Publish site (render HTML)
        if: steps.ollama_check.outputs.reachable == 'true' && steps.improve_controller.outcome == 'success'
        run: .venv/bin/python publish_site.py

      - name: Commit improvements
        if: steps.ollama_check.outputs.reachable == 'true' && steps.improve_controller.outcome == 'success'
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit from improvement loop"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: improvement pass $TIMESTAMP [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.ollama_check.outputs.reachable == 'true' && steps.improve_controller.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Upload improvement logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: improvement-log-${{ github.run_id }}
          path: |
            state/improvement-log.md
            state/errors.log
            state/progress-log.md
            state/critic-review-*.json
            state/quality-gate-*.json
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
