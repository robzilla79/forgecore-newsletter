name: Continuous Improvement Loop

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: forgecore-newsletter-improve
  cancel-in-progress: true

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Cost-optimized: gpt-4o-mini (~$0.002/run vs $0.10 with gpt-4o)
      RESEARCH_MODEL: ${{ secrets.RESEARCH_MODEL || 'gpt-4o-mini' }}
      WRITER_MODEL: ${{ secrets.WRITER_MODEL || 'gpt-4o-mini' }}
      EDITOR_MODEL: ${{ secrets.EDITOR_MODEL || 'gpt-4o-mini' }}
      CRITIC_MODEL: ${{ secrets.CRITIC_MODEL || 'gpt-4o-mini' }}
      FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'gpt-4o-mini' }}
      # Critic thresholds — calibrated for gpt-4o-mini generated content.
      MIN_CRITIC_OVERALL: '6.5'
      MIN_CRITIC_CATEGORY: '6.0'
      SITE_DOMAIN: news.forgecore.co
      SITE_BASE_URL: https://news.forgecore.co
      NEWSLETTER_NAME: ForgeCore AI Productivity Brief
      NEWSLETTER_TAGLINE: Practical AI workflows, tools, and ROI cases for operators
      TARGET_AUDIENCE: Operators, founders, consultants, and technical teams adopting AI workflows.
      PRIMARY_CTA_TEXT: Subscribe for weekly operator-grade AI workflows
      PRIMARY_CTA_URL: https://forgecore-newsletter.beehiiv.com/
      SPONSOR_EMAIL: sponsors@forgecore.co
      MAX_CONTEXT_CHARS: '22000'
      AUTO_REPAIR_PATHS: '1'
      MAX_TARGETED_REWRITE_ITEMS: '6'
      MAX_ARTICLES_PER_RUN: '4'
      MAX_FEED_ITEMS_PER_SOURCE: '4'
      CLOUDFLARE_PAGES_PROJECT: forgecore-newsletter
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
      KIT_SEND_MODE: 'public'
      BEEHIIV_EMBED_HTML: ${{ secrets.BEEHIIV_EMBED_HTML }}
      BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
      BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
      BEEHIIV_PUBLICATION_URL: https://forgecore-newsletter.beehiiv.com/
      BEEHIIV_SEND_MODE: 'draft'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run improvement controller
        id: improve_controller
        env:
          IMPROVEMENT_ORIGIN: improve
        run: python improve_until_passes.py

      - name: Publish site (render HTML)
        if: steps.improve_controller.outcome == 'success'
        run: python publish_site.py

      - name: Write CI HEARTBEAT
        if: always()
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          printf '# Last Run Status: %s\n- Origin: GitHub Actions (%s)\n- Run ID: %s\n- Runner: ubuntu-latest\n- Models: research=%s, writer=%s, editor=%s, fallback=%s\n' \
            "$TIMESTAMP" "${{ github.workflow }}" "${{ github.run_id }}" \
            "${RESEARCH_MODEL:-gpt-4o-mini}" "${WRITER_MODEL:-gpt-4o-mini}" \
            "${EDITOR_MODEL:-gpt-4o-mini}" "${FALLBACK_MODEL:-gpt-4o-mini}" \
            > HEARTBEAT.md
          echo "[heartbeat] Written for $TIMESTAMP"

      - name: Commit improvements
        if: steps.improve_controller.outcome == 'success'
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add content/issues/ state/ site/dist/ HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "Nothing to commit from improvement loop"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "auto: improvement pass $TIMESTAMP [bot]"
            git push
          fi

      - name: Commit HEARTBEAT on failure
        if: steps.improve_controller.outcome != 'success'
        run: |
          git config user.name "ForgeCore AI Bot"
          git config user.email "bot@forgecore.co"
          git add HEARTBEAT.md
          if git diff --staged --quiet; then
            echo "HEARTBEAT unchanged"
          else
            git commit -m "heartbeat: improve run ${{ github.run_id }} (skipped/failed) [bot]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.improve_controller.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=forgecore-newsletter --commit-dirty=true --branch=main

      - name: Upload improvement logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: improvement-log-${{ github.run_id }}
          path: |
            state/improvement-log.md
            state/errors.log
            state/progress-log.md
            state/critic-review-*.json
            state/quality-gate-*.json
            HEARTBEAT.md
          retention-days: 14
          if-no-files-found: warn
