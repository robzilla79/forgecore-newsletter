name: Em Sends the PM Issue

# PM send schedule removed. Send is now handled by send-daily.yml (manual).
# This wrapper is kept for manual legacy slot use only.
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  send-pm:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm
