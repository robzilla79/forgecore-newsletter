name: Em Sends the PM Issue

on:
  schedule:
    # Send window: 4:21 PM Central during daylight time, 3:21 PM Central during standard time.
    - cron: '21 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  send-pm:
    uses: ./.github/workflows/send.yml
    secrets: inherit
    with:
      issue_slot: pm
